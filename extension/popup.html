<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MASM Extension</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Login View -->
    <div id="login-view" class="view">
      <div class="popup-header">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">MASM</span>
      </div>
      <p class="subtitle">Sign in to manage sessions</p>
      
      <div id="login-error" class="error-msg" style="display: none;"></div>
      
      <input type="email" id="login-email" class="input-field" placeholder="Email" />
      <input type="password" id="login-password" class="input-field" placeholder="Password" />
      <button id="login-btn" class="btn-primary">Sign In</button>
    </div>

    <!-- Dashboard View -->
    <div id="dashboard-view" class="view" style="display: none;">
      <div class="popup-header">
        <div class="header-left">
          <span class="logo-icon">⚡</span>
          <span class="logo-text">MASM</span>
        </div>
        <button id="logout-btn" class="btn-icon" title="Logout">🚪</button>
      </div>

      <div class="user-bar">
        <span id="user-name">User</span>
        <span id="session-count" class="badge">0 active</span>
      </div>

      <div class="section-title">Quick Connect</div>
      <div id="services-list" class="services-list">
        <div class="loading-text">Loading services...</div>
      </div>

      <div class="section-title">Active Sessions</div>
      <div id="sessions-list" class="sessions-list">
        <div class="empty-text">No active sessions</div>
      </div>

      <div class="footer-link">
        <a href="http://localhost:3000/dashboard" target="_blank" id="dashboard-link">Open Dashboard →</a>
      </div>
    </div>

    <!-- Status overlay -->
    <div id="status-overlay" class="overlay" style="display: none;">
      <div class="spinner"></div>
      <span id="status-text">Connecting...</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
